<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun — Portal Akademik IIN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0B1F3A; --gold:#C9A84C; --gold-light:#E8C96A; --cream:#F5F0E8; --cream-dark:#EDE7D9; --white:#FFFFFF; --text-dark:#1A1A2E; --text-muted:#6B7280; --border:rgba(11,31,58,0.12); --error:#C0392B; --green:#2E7D32; --green-bg:#E8F5E9; }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .register-wrap { width:100%; max-width:520px; }
    .register-logo { display:flex; align-items:center; gap:12px; margin-bottom:2rem; justify-content:center; }
    .register-logo img { width:48px; height:48px; border-radius:50%; }
    .register-logo div strong { display:block; font-size:15px; font-weight:600; color:var(--navy); }
    .register-logo div span { font-size:12px; color:var(--text-muted); }
    .register-box { background:var(--white); border-radius:20px; padding:2.5rem; box-shadow:0 4px 24px rgba(11,31,58,.08); }
    .register-box h2 { font-family:'DM Serif Display',serif; font-size:1.8rem; color:var(--navy); margin-bottom:.4rem; }
    .register-box p { font-size:14px; color:var(--text-muted); margin-bottom:2rem; }
    .tab-bar { display:flex; background:var(--cream-dark); border-radius:10px; padding:4px; margin-bottom:1.5rem; }
    .tab-btn { flex:1; padding:8px; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-muted); border-radius:8px; cursor:pointer; }
    .tab-btn.active { background:var(--white); color:var(--navy); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; font-size:12px; font-weight:500; color:var(--navy); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .form-group input, .form-group select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-dark); background:var(--white); outline:none; transition:border-color .2s; }
    .form-group input:focus, .form-group select:focus { border-color:var(--navy); }
    .btn-register { width:100%; padding:14px; background:var(--navy); color:var(--white); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-top:.5rem; }
    .btn-register:disabled { background:#999; cursor:not-allowed; }
    .error-msg { background:rgba(192,57,43,.08); border:1px solid rgba(192,57,43,.2); color:var(--error); font-size:13px; padding:10px 14px; border-radius:8px; margin-bottom:1rem; display:none; }
    .success-msg { background:var(--green-bg); border:1px solid rgba(46,125,50,.2); color:var(--green); font-size:13px; padding:10px 14px; border-radius:8px; margin-bottom:1rem; display:none; }
    .login-link { text-align:center; font-size:13px; color:var(--text-muted); margin-top:1.5rem; }
    .login-link a { color:var(--navy); font-weight:600; text-decoration:none; }
    .pass-hint { font-size:11px; color:var(--text-muted); margin-top:4px; }
  </style>
</head>
<body>

  <div class="register-wrap">
    <div class="register-logo">
      <img src="logo.png" alt="Logo IIN">
      <div>
        <strong>Institut Integritas Nusantara</strong>
        <span>Pendaftaran Akun Portal</span>
      </div>
    </div>

    <div class="register-box">
      <h2>Daftar Akun Baru</h2>
      <p>Isi data diri Anda untuk membuat akun portal kampus.</p>

      <div class="tab-bar">
        <button class="tab-btn active" id="tab-mahasiswa" onclick="setRole('mahasiswa')">Mahasiswa</button>
        <button class="tab-btn" id="tab-dosen" onclick="setRole('dosen')">Dosen</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Nama sesuai KTP">
        </div>
        <div class="form-group">
          <label id="nimLabel">NIM</label>
          <input type="text" id="nim" placeholder="Nomor Induk">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="contoh@iin.ac.id">
      </div>

      <div class="form-group" id="prodiGroup">
        <label>Program Studi</label>
        <select id="prodi">
          <option value="">-- Pilih Program Studi --</option>
          <option>Teknik Informatika</option>
          <option>Sistem Informasi</option>
          <option>Teknik Elektro</option>
          <option>Manajemen</option>
          <option>Akuntansi</option>
          <option>Hukum</option>
          <option>Kedokteran</option>
          <option>Psikologi</option>
        </select>
      </div>

      <div class="form-group" id="angkatanGroup">
        <label id="angkatanLabel">Angkatan</label>
        <select id="angkatan">
          <option value="">-- Pilih Angkatan --</option>
          <option>2024</option>
          <option>2023</option>
          <option>2022</option>
          <option>2021</option>
          <option>2020</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Kata Sandi</label>
          <input type="password" id="password" placeholder="Min. 6 karakter">
          <div class="pass-hint">Minimal 6 karakter</div>
        </div>
        <div class="form-group">
          <label>Konfirmasi Sandi</label>
          <input type="password" id="konfirmasi" placeholder="Ulangi kata sandi">
        </div>
      </div>

      <button class="btn-register" id="btnRegister" onclick="doRegister()">Buat Akun</button>

      <div class="login-link">
        Sudah punya akun? <a href="login.html">Masuk di sini</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIza5yAMoshhd5TITJzLeXnd_p84571CUgs2m0",
      authDomain: "portalkampus-iin.firebaseapp.com",
      projectId: "portalkampus-iin",
      storageBucket: "portalkampus-iin.firebasestorage.app",
      messagingSenderId: "325715653393",
      appId: "1:325715653393:web:4eb1e139b2f7317d9dfcdffd8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    var currentRole = 'mahasiswa';

    window.setRole = function(role) {
      currentRole = role;
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('tab-' + role).classList.add('active');

      if (role === 'dosen') {
        document.getElementById('nimLabel').textContent = 'NIDN';
        document.getElementById('nim').placeholder = 'Nomor Induk Dosen';
        document.getElementById('angkatanLabel').textContent = 'Jabatan';
        document.getElementById('angkatan').innerHTML = '<option value="">-- Pilih Jabatan --</option><option>Asisten Ahli</option><option>Lektor</option><option>Lektor Kepala</option><option>Profesor</option>';
      } else {
        document.getElementById('nimLabel').textContent = 'NIM';
        document.getElementById('nim').placeholder = 'Nomor Induk Mahasiswa';
        document.getElementById('angkatanLabel').textContent = 'Angkatan';
        document.getElementById('angkatan').innerHTML = '<option value="">-- Pilih Angkatan --</option><option>2024</option><option>2023</option><option>2022</option><option>2021</option><option>2020</option>';
      }
    };

    window.doRegister = async function() {
      var nama = document.getElementById('nama').value.trim();
      var nim = document.getElementById('nim').value.trim();
      var email = document.getElementById('email').value.trim();
      var prodi = document.getElementById('prodi').value;
      var angkatan = document.getElementById('angkatan').value;
      var password = document.getElementById('password').value;
      var konfirmasi = document.getElementById('konfirmasi').value;
      var err = document.getElementById('errorMsg');
      var suc = document.getElementById('successMsg');
      var btn = document.getElementById('btnRegister');

      err.style.display = 'none';
      suc.style.display = 'none';

      if (!nama || !nim || !email || !prodi || !angkatan || !password || !konfirmasi) {
        err.textContent = 'Harap isi semua kolom.';
        err.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        err.textContent = 'Kata sandi minimal 6 karakter.';
        err.style.display = 'block';
        return;
      }
      if (password !== konfirmasi) {
        err.textContent = 'Kata sandi dan konfirmasi tidak cocok.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Mendaftarkan akun...';

      try {
        var result = await createUserWithEmailAndPassword(auth, email, password);
        var uid = result.user.uid;

        await setDoc(doc(db, 'users', uid), {
          nama: nama,
          nim: nim,
          email: email,
          prodi: prodi,
          angkatan: angkatan,
          role: currentRole,
          status: 'aktif',
          createdAt: new Date().toISOString()
        });

        suc.textContent = 'Akun berhasil dibuat! Mengalihkan ke halaman login...';
        suc.style.display = 'block';

        setTimeout(function() {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        btn.disabled = false;
        btn.textContent = 'Buat Akun';
        var msg = 'Gagal membuat akun. Coba lagi.';
        if (error.code === 'auth/email-already-in-use') { msg = 'Email sudah terdaftar. Silakan login.'; }
        if (error.code === 'auth/invalid-email') { msg = 'Format email tidak valid.'; }
        if (error.code === 'auth/weak-password') { msg = 'Kata sandi terlalu lemah. Minimal 6 karakter.'; }
        err.textContent = msg;
        err.style.display = 'block';
      }
    };
  </script>
</body>
</html>
